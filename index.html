<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ジャグラー設定判定AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #050010;
        font-family: "Segoe UI", sans-serif;
        color: #fff;
    }

    .wrapper {
        width: 390px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 10px;
        box-sizing: border-box;
        background: radial-gradient(circle at top, #7b2cbf 0%, #050010 55%);
    }

    h1 {
        text-align: center;
        font-size: 26px;
        margin: 10px 0 5px;
        color: #ffb3ff;
        text-shadow: 0 0 10px #ff4dff;
    }

    /* GOGOランプ本体 */
    .gogo-wrap {
        display: flex;
        justify-content: center;
        margin: 10px 0 15px;
    }

    .gogo-lamp {
        width: 120px;
        height: 60px;
        border-radius: 30px;
        background: radial-gradient(circle at center, #ff4dff 0%, #7b2cbf 40%, #050010 100%);
        box-shadow: 0 0 15px #ff4dff;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: bold;
        letter-spacing: 2px;
        font-size: 18px;
        text-shadow: 0 0 8px #ffffff;
        transition: 0.2s;
        opacity: 0.25;
    }

    .gogo-lamp.mid {
        opacity: 0.6;
        box-shadow: 0 0 20px #ff4dff;
    }

    .gogo-lamp.high {
        opacity: 1;
        box-shadow: 0 0 30px #ff4dff;
        transform: scale(1.05);
    }

    /* シリーズ選択 */
    .select-box {
        background: #140020;
        padding: 10px 15px;
        border-radius: 10px;
        margin-bottom: 10px;
        box-shadow: 0 0 10px #5a189a;
    }

    .select-box label {
        font-size: 14px;
        color: #ffb3ff;
    }

    select {
        width: 100%;
        margin-top: 5px;
        padding: 8px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }

    /* 入力ボックス */
    .input-box, .result-box {
        background: #1a0b2e;
        padding: 15px;
        border-radius: 12px;
        width: 100%;
        margin: 0 auto 15px auto;
        box-shadow: 0 0 15px #5a189a;
        text-align: center;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 6px 0;
        border-radius: 8px;
        border: none;
        font-size: 18px;
        text-align: center;
    }

    /* 補正パイロットランプ（ミニGOGO） */
    .pilot-wrap {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 10px 0;
        font-size: 13px;
    }

    .pilot {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .pilot-lamp {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: radial-gradient(circle at center, #3a0050 0%, #050010 70%);
        box-shadow: 0 0 5px #000;
        transition: 0.2s;
    }

    .pilot-lamp.on {
        background: radial-gradient(circle at center, #ff4dff 0%, #7b2cbf 40%, #050010 100%);
        box-shadow: 0 0 10px #ff4dff;
    }

    /* 判定ボタン（GOGO風） */
    .btn-wrap {
        width: 100%;
        text-align: center;
        margin-top: 10px;
    }

    button {
        background: radial-gradient(circle at top, #ff4dff 0%, #7b2cbf 40%, #3a0050 100%);
        color: white;
        padding: 14px 30px;
        border: none;
        border-radius: 10px;
        font-size: 20px;
        cursor: pointer;
        width: 90%;
        max-width: 300px;
        display: inline-block;
        box-shadow: 0 0 15px #ff4dff;
        transition: 0.15s;
    }

    button:hover {
        box-shadow: 0 0 25px #ffb3ff;
        transform: scale(1.03);
    }

    .setting-line {
        font-size: 18px;
        margin: 4px 0;
    }

    canvas {
        display: block;
        margin: 10px auto 0;
        width: 100%;
        max-width: 350px;
    }
</style>
</head>
<body>
<div class="wrapper">

    <h1>ジャグラー設定判定AI</h1>

    <!-- GOGOランプ本体 -->
    <div class="gogo-wrap">
        <div id="gogoLamp" class="gogo-lamp">GOGO!</div>
    </div>

    <!-- シリーズ選択 -->
    <div class="select-box">
        <label for="seriesSelect">シリーズ選択（6号機）</label>
        <select id="seriesSelect">
            <option value="myjv">マイジャグラーV</option>
            <option value="aim6">アイムジャグラーEX（6号機）</option>
            <option value="funky2">ファンキージャグラー2</option>
            <option value="gogo3">ゴーゴージャグラー3</option>
        </select>
    </div>

    <!-- 入力欄 -->
    <div class="input-box">
        <input id="spins" type="number" inputmode="numeric" placeholder="総回転数">
        <input id="big" type="number" inputmode="numeric" placeholder="BIG">
        <input id="reg" type="number" inputmode="numeric" placeholder="REG">
        <input id="grape" type="number" inputmode="numeric" placeholder="ぶどう（100G中の回数）">
        <input id="maxcoin" type="number" inputmode="numeric" placeholder="最高出玉（ピーク）">
        <input id="currentCoin" type="number" inputmode="decimal" placeholder="現在持ち玉（今）">

        <!-- 補正パイロットランプ -->
        <div class="pilot-wrap">
            <div class="pilot">
                <div id="pilotGrape" class="pilot-lamp"></div>
                <span>ぶどう補正</span>
            </div>
            <div class="pilot">
                <div id="pilotDiff" class="pilot-lamp"></div>
                <span>差枚補正</span>
            </div>
        </div>
    </div>

    <!-- 判定ボタン -->
    <div class="btn-wrap">
        <button onclick="judge()">GOGO! 判定する</button>
    </div>

    <!-- 結果表示 -->
    <div id="result" class="result-box" style="display:none;"></div>

    <!-- グラフ -->
    <canvas id="chart"></canvas>

</div>

<script>
/* シリーズごとの設定テーブル（ざっくり目安） */
const seriesData = {
    myjv: {
        name: "マイジャグラーV",
        setting: {
            1: { big: 287, reg: 431, sum: 172, grape: 6.35, rate: 0.97 },
            2: { big: 282, reg: 364, sum: 160, grape: 6.33, rate: 0.984 },
            3: { big: 273, reg: 341, sum: 152, grape: 6.29, rate: 0.997 },
            4: { big: 264, reg: 292, sum: 138, grape: 6.25, rate: 1.027 },
            5: { big: 259, reg: 259, sum: 129, grape: 6.23, rate: 1.053 },
            6: { big: 240, reg: 240, sum: 120, grape: 6.18, rate: 1.094 }
        }
    },
    aim6: {
        name: "アイムジャグラーEX（6号機）",
        setting: {
            1: { big: 273, reg: 439, sum: 169, grape: 6.40, rate: 96.0/100 },
            2: { big: 270, reg: 399, sum: 161, grape: 6.38, rate: 97.0/100 },
            3: { big: 268, reg: 331, sum: 152, grape: 6.36, rate: 99.5/100 },
            4: { big: 260, reg: 299, sum: 141, grape: 6.34, rate: 102.0/100 },
            5: { big: 255, reg: 255, sum: 127, grape: 6.32, rate: 104.0/100 },
            6: { big: 237, reg: 237, sum: 118, grape: 6.30, rate: 106.0/100 }
        }
    },
    funky2: {
        name: "ファンキージャグラー2",
        setting: {
            1: { big: 273, reg: 439, sum: 169, grape: 6.40, rate: 97.0/100 },
            2: { big: 268, reg: 399, sum: 161, grape: 6.38, rate: 98.0/100 },
            3: { big: 260, reg: 331, sum: 152, grape: 6.36, rate: 100.0/100 },
            4: { big: 252, reg: 299, sum: 141, grape: 6.34, rate: 103.0/100 },
            5: { big: 246, reg: 255, sum: 127, grape: 6.32, rate: 105.0/100 },
            6: { big: 234, reg: 234, sum: 117, grape: 6.30, rate: 108.0/100 }
        }
    },
    gogo3: {
        name: "ゴーゴージャグラー3",
        setting: {
            1: { big: 276, reg: 431, sum: 171, grape: 6.40, rate: 97.0/100 },
            2: { big: 270, reg: 364, sum: 160, grape: 6.38, rate: 98.0/100 },
            3: { big: 264, reg: 341, sum: 152, grape: 6.36, rate: 100.0/100 },
            4: { big: 258, reg: 292, sum: 141, grape: 6.34, rate: 103.0/100 },
            5: { big: 252, reg: 259, sum: 129, grape: 6.32, rate: 105.0/100 },
            6: { big: 240, reg: 240, sum: 120, grape: 6.30, rate: 108.0/100 }
        }
    }
};

let chart = null;

/* GOGOランプの状態更新 */
function updateGogoLamp(grapeOn, diffOn, flash) {
    const lamp = document.getElementById("gogoLamp");
    lamp.classList.remove("mid", "high");

    if (flash) {
        lamp.classList.add("high");
        setTimeout(() => {
            lamp.classList.remove("high");
            if (grapeOn && diffOn) {
                lamp.classList.add("mid");
            } else if (grapeOn || diffOn) {
                lamp.classList.add("mid");
            }
        }, 250);
        return;
    }

    if (grapeOn && diffOn) {
        lamp.classList.add("mid");
    } else if (grapeOn || diffOn) {
        lamp.classList.add("mid");
    } else {
        // 消灯状態（デフォルト）
    }
}

/* 補正パイロットランプ更新 */
function updatePilotLamps(grapeOn, diffOn) {
    const pg = document.getElementById("pilotGrape");
    const pd = document.getElementById("pilotDiff");
    pg.classList.toggle("on", grapeOn);
    pd.classList.toggle("on", diffOn);
}

/* 判定メイン */
function judge() {
    const seriesKey = document.getElementById("seriesSelect").value;
    const settingTable = seriesData[seriesKey].setting;

    const spins = Number(document.getElementById("spins").value) || 0;
    const big = Number(document.getElementById("big").value) || 0;
    const reg = Number(document.getElementById("reg").value) || 0;
    const grape = Number(document.getElementById("grape").value) || 0;
    const maxcoin = Number(document.getElementById("maxcoin").value) || 0;
    const currentCoin = Number(document.getElementById("currentCoin").value) || 0;

    const sum = big + reg;
    const diffCoin = currentCoin - maxcoin;

    let status = "KEEP";
    if (diffCoin < 0) status = "DOWN";

    const grapeOn = grape > 0;
    const diffOn = (currentCoin !== 0 || maxcoin !== 0);

    updatePilotLamps(grapeOn, diffOn);
    updateGogoLamp(grapeOn, diffOn, true); // 判定時ペカッ

    let scores = {};

    for (let s = 1; s <= 6; s++) {
        const base = settingTable[s];

        const actualBig = big > 0 ? spins / big : 9999;
        const actualReg = reg > 0 ? spins / reg : 9999;
        const actualSum = sum > 0 ? spins / sum : 9999;
        const actualGrape = grape > 0 ? 100 / grape : 9999;

        const diffBig = Math.abs(actualBig - base.big);
        const diffReg = Math.abs(actualReg - base.reg);
        const diffSum = Math.abs(actualSum - base.sum);
        const diffGrape = Math.abs(actualGrape - base.grape);

        let score =
            (1 / (diffBig + 1)) * 1 +
            (1 / (diffReg + 1)) * 3 +
            (1 / (diffSum + 1)) * 4;

        if (grapeOn) {
            score += (1 / (diffGrape + 1)) * 2;
        }

        if (diffOn) {
            const expectedCoin = spins * 3 * base.rate;
            const diff = Math.abs(diffCoin - expectedCoin);
            score += (1 / (diff + 1)) * 1;
        }

        scores[s] = score;
    }

    const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
    for (let s = 1; s <= 6; s++) {
        scores[s] = (scores[s] / total) * 100;
    }

    let html = `<h2>${seriesData[seriesKey].name} 設定判別結果</h2>`;
    html += `<div style="font-size:20px; margin-bottom:8px;">状態：<b>${status}</b></div>`;
    html += `<div style="font-size:16px; margin-bottom:12px;">差枚：${diffCoin} 枚</div>`;

    for (let s = 1; s <= 6; s++) {
        html += `<div class="setting-line">設定${s}：${scores[s].toFixed(1)}%</div>`;
    }

    const resultBox = document.getElementById("result");
    resultBox.innerHTML = html;
    resultBox.style.display = "block";

    const ctx = document.getElementById("chart");
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["設定1", "設定2", "設定3", "設定4", "設定5", "設定6"],
            datasets: [{
                data: [
                    scores[1], scores[2], scores[3],
                    scores[4], scores[5], scores[6]
                ],
                backgroundColor: [
                    "#ff4d6d", "#ffb3c1", "#c77dff",
                    "#9d4edd", "#7b2cbf", "#5a189a"
                ],
                borderColor: "#ffffff",
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true, ticks: { color: "white" } },
                x: { ticks: { color: "white" } }
            },
            plugins: { legend: { display: false } }
        }
    });
}
</script>
</body>
</html>
