<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>マイジャグV 設定判定AI（潤さん専用）</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    .wrapper {
        width: 390px;
        margin: 0 auto;
        background: #0b0014;
        min-height: 100vh;
        padding: 10px;
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 0;
        background: #000;
        font-family: "Segoe UI", sans-serif;
        color: #fff;
        overflow-x: hidden;
    }

    h1 {
        color: #c77dff;
        text-shadow: 0 0 10px #9d4edd;
        margin: 20px 0;
        font-size: 30px;
        text-align: center;
    }

    .input-box, .result-box {
        background: #1a0b2e;
        padding: 20px;
        border-radius: 12px;
        width: 100%;
        margin: 0 auto 20px auto;
        box-shadow: 0 0 15px #5a189a;
        text-align: center;
    }

    input {
        width: 90%;
        padding: 14px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        font-size: 20px;
        text-align: center;
    }

    /* ← 修正版：ボタン完全センター */
    .btn-wrap {
        width: 100%;
        text-align: center;
        margin-top: 20px;
    }

    button {
        background: #7b2cbf;
        color: white;
        padding: 16px 30px;
        border: none;
        border-radius: 10px;
        font-size: 22px;
        cursor: pointer;
        width: 90%;
        max-width: 300px;
        display: inline-block; /* ← これで絶対センター */
        box-shadow: 0 0 10px #9d4edd;
        transition: 0.2s;
    }

    button:hover {
        background: #9d4edd;
        box-shadow: 0 0 20px #c77dff;
    }

    .setting-line {
        font-size: 24px;
        margin: 8px 0;
    }

    canvas {
        display: block;
        margin: 20px auto;
        width: 100%;
        max-width: 350px;
    }
</style>

</head>
<body>

<div class="wrapper">

<h1>マイジャグV 設定判定AI</h1>

<div class="input-box">
    <input id="spins" type="number" inputmode="numeric" placeholder="総回転数">
    <input id="big" type="number" inputmode="numeric" placeholder="BIG">
    <input id="reg" type="number" inputmode="numeric" placeholder="REG">
    <input id="grape" type="number" inputmode="numeric" placeholder="ぶどう（100G中の回数）">
    <input id="maxcoin" type="number" inputmode="numeric" placeholder="最高出玉（ピーク）">

    <!-- ← 修正版：decimal でマイナス入力OK -->
    <input id="currentCoin" type="number" inputmode="decimal" placeholder="現在持ち玉（今）">
</div>

<div class="btn-wrap">
    <button onclick="judge()">判定する</button>
</div>

<div id="result" class="result-box" style="display:none;"></div>

<canvas id="chart"></canvas>

</div>

<script>
// 設定ごとの確率（分母）
const setting = {
    1: { big: 287, reg: 431, sum: 172, grape: 6.35, rate: 0.97 },
    2: { big: 282, reg: 364, sum: 160, grape: 6.33, rate: 0.984 },
    3: { big: 273, reg: 341, sum: 152, grape: 6.29, rate: 0.997 },
    4: { big: 264, reg: 292, sum: 138, grape: 6.25, rate: 1.027 },
    5: { big: 259, reg: 259, sum: 129, grape: 6.23, rate: 1.053 },
    6: { big: 240, reg: 240, sum: 120, grape: 6.18, rate: 1.094 }
};

let chart = null;

function judge() {
    const spins = Number(document.getElementById("spins").value) || 0;
    const big = Number(document.getElementById("big").value) || 0;
    const reg = Number(document.getElementById("reg").value) || 0;
    const grape = Number(document.getElementById("grape").value) || 0;
    const maxcoin = Number(document.getElementById("maxcoin").value) || 0;
    const currentCoin = Number(document.getElementById("currentCoin").value) || 0;

    const sum = big + reg;

    // 差枚（自動計算）
    const diffCoin = currentCoin - maxcoin;

    // 状態表示
    let status = "KEEP";
    if (diffCoin < 0) status = "DOWN";

    let scores = {};

    for (let s = 1; s <= 6; s++) {

        // 実際の確率（分母）
        const actualBig = big > 0 ? spins / big : 9999;
        const actualReg = reg > 0 ? spins / reg : 9999;
        const actualSum = sum > 0 ? spins / sum : 9999;
        const actualGrape = grape > 0 ? 100 / grape : 9999;

        // 差（小さいほど良い）
        const diffBig = Math.abs(actualBig - setting[s].big);
        const diffReg = Math.abs(actualReg - setting[s].reg);
        const diffSum = Math.abs(actualSum - setting[s].sum);
        const diffGrape = Math.abs(actualGrape - setting[s].grape);

        // スコア化（差が小さいほど高得点）
        let score =
            (1 / (diffBig + 1)) * 1 +
            (1 / (diffReg + 1)) * 3 +
            (1 / (diffSum + 1)) * 4;

        // ぶどう補正（入力があればON）
        if (grape > 0) {
            score += (1 / (diffGrape + 1)) * 2;
        }

        // 差枚補正（入力があればON）
        if (currentCoin !== 0 || maxcoin !== 0) {
            const expectedCoin = spins * 3 * setting[s].rate;
            const diff = Math.abs(diffCoin - expectedCoin);
            score += (1 / (diff + 1)) * 1;
        }

        scores[s] = score;
    }

    // 正規化
    const total = Object.values(scores).reduce((a,b)=>a+b,0);
    for (let s = 1; s <= 6; s++) {
        scores[s] = (scores[s] / total) * 100;
    }

    // 結果表示
    let html = `<h2>設定判別結果</h2>`;
    html += `<div style="font-size:22px; margin-bottom:10px;">状態：<b>${status}</b></div>`;
    html += `<div style="font-size:18px; margin-bottom:20px;">差枚：${diffCoin} 枚</div>`;

    for (let s = 1; s <= 6; s++) {
        html += `<div class="setting-line">設定${s}：${scores[s].toFixed(1)}%</div>`;
    }

    document.getElementById("result").innerHTML = html;
    document.getElementById("result").style.display = "block";

    // グラフ
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["設定1", "設定2", "設定3", "設定4", "設定5", "設定6"],
            datasets: [{
                data: [
                    scores[1], scores[2], scores[3],
                    scores[4], scores[5], scores[6]
                ],
                backgroundColor: [
                    "#ff4d6d", "#ffb3c1", "#c77dff",
                    "#9d4edd", "#7b2cbf", "#5a189a"
                ],
                borderColor: "#ffffff",
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true, ticks: { color: "white" } },
                x: { ticks: { color: "white" } }
            },
            plugins: { legend: { display: false } }
        }
    });
}
</script>

</body>
</html>
