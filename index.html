<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マイジャグV 設定判定AI（潤さん専用）</title>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        background: #0b0014;
        color: #fff;
        font-family: "Segoe UI", sans-serif;
        text-align: center;
        padding: 20px;
        margin: 0;
        overflow-x: hidden;
    }

    h1 {
        color: #c77dff;
        text-shadow: 0 0 10px #9d4edd;
        margin-bottom: 30px;
        font-size: 26px; /* ←小さく調整済み */
    }

    .input-box, .result-box {
        background: #1a0b2e;
        padding: 20px;
        border-radius: 12px;
        width: 95%;
        max-width: 450px;
        margin: 0 auto 20px auto;
        box-shadow: 0 0 15px #5a189a;
    }

    input {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        font-size: 18px;
        text-align: center;
    }

    button {
        background: #7b2cbf;
        color: white;
        padding: 14px 30px;
        border: none;
        border-radius: 10px;
        font-size: 20px;
        cursor: pointer;
        margin-top: 10px;
        box-shadow: 0 0 10px #9d4edd;
        transition: 0.2s;
        width: 90%;
        max-width: 300px;
    }

    button:hover {
        background: #9d4edd;
        box-shadow: 0 0 20px #c77dff;
    }

    .setting-line {
        font-size: 22px;
        margin: 8px 0;
    }

    /* グラフ中央寄せ */
    canvas {
        display: block;
        margin: 20px auto;
        max-width: 350px;
    }
</style>

</head>
<body>

<h1>マイジャグV 設定判定AI（潤さん専用）</h1>

<div class="input-box">
    <input id="spins" type="number" placeholder="総回転数">
    <input id="big" type="number" placeholder="BIG">
    <input id="reg" type="number" placeholder="REG">
    <input id="maxcoin" type="number" placeholder="最高出玉">
</div>

<button onclick="judge()">判定する</button>

<div id="result" class="result-box" style="display:none;"></div>

<canvas id="chart"></canvas>

<script>
// マイジャグV 設定ごとの確率データ
const data = {
    1: { big: 1/287, reg: 1/431, sum: 1/172 },
    2: { big: 1/282, reg: 1/364, sum: 1/160 },
    3: { big: 1/273, reg: 1/341, sum: 1/152 },
    4: { big: 1/264, reg: 1/292, sum: 1/138 },
    5: { big: 1/259, reg: 1/259, sum: 1/129 },
    6: { big: 1/240, reg: 1/240, sum: 1/120 }
};

// 設定ごとの期待最高出玉
const expected = {
    1: 1500,
    2: 2000,
    3: 2500,
    4: 3000,
    5: 3500,
    6: 4000
};

// 二項分布の簡易尤度
function likelihood(hit, total, prob) {
    return Math.pow(prob, hit) * Math.pow(1 - prob, total - hit);
}

let chart = null;

function judge() {
    const spins = Number(document.getElementById("spins").value);
    const big = Number(document.getElementById("big").value);
    const reg = Number(document.getElementById("reg").value);
    const maxcoin = Number(document.getElementById("maxcoin").value);
    const sum = big + reg;

    let scores = {};

    for (let s = 1; s <= 6; s++) {
        const pBig = data[s].big;
        const pReg = data[s].reg;
        const pSum = data[s].sum;

        const Lbig = likelihood(big, spins, pBig);
        const Lreg = likelihood(reg, spins, pReg);
        const Lsum = likelihood(sum, spins, pSum);

        let score = 
            Math.pow(Lbig, 1) *
            Math.pow(Lreg, 3) *
            Math.pow(Lsum, 4);

        // 最高出玉補正（強め）
        let adj = maxcoin / expected[s];
        adj = Math.max(0.5, Math.min(adj, 1.5));

        scores[s] = score * adj;
    }

    const total = Object.values(scores).reduce((a,b)=>a+b,0);
    for (let s = 1; s <= 6; s++) {
        scores[s] = (scores[s] / total) * 100;
    }

    // テキスト表示
    let html = "<h2>設定判別結果</h2>";
    for (let s = 1; s <= 6; s++) {
        html += `<div class="setting-line">設定${s}：${scores[s].toFixed(1)}%</div>`;
    }
    document.getElementById("result").innerHTML = html;
    document.getElementById("result").style.display = "block";

    // 棒グラフ描画
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["設定1", "設定2", "設定3", "設定4", "設定5", "設定6"],
            datasets: [{
                data: [
                    scores[1], scores[2], scores[3],
                    scores[4], scores[5], scores[6]
                ],
                backgroundColor: [
                    "#ff4d6d", "#ffb3c1", "#c77dff",
                    "#9d4edd", "#7b2cbf", "#5a189a"
                ],
                borderColor: "#ffffff",
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { color: "white" }
                },
                x: {
                    ticks: { color: "white" }
                }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
}
</script>

</body>
</html>
