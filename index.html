<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ジャグラー設定判定AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #050010;
        font-family: "Segoe UI", sans-serif;
        color: #fff;
        overflow-x: hidden;
    }

    .wrapper {
        width: 390px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 10px;
        box-sizing: border-box;
        background: radial-gradient(circle at top, #7b2cbf 0%, #050010 55%);
    }

    h1 {
        text-align: center;
        font-size: 26px;
        margin: 10px 0 5px;
        color: #ffb3ff;
        text-shadow: 0 0 10px #ff4dff;
    }

    /* GOGOランプ本体 */
    .gogo-wrap {
        display: flex;
        justify-content: center;
        margin: 10px 0 15px;
    }

    .gogo-lamp {
        width: 120px;
        height: 60px;
        border-radius: 30px;
        background: radial-gradient(circle at center, #ff4dff 0%, #7b2cbf 40%, #050010 100%);
        box-shadow: 0 0 15px #ff4dff;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: bold;
        letter-spacing: 2px;
        font-size: 18px;
        text-shadow: 0 0 8px #ffffff;
        transition: 0.2s;
        opacity: 0.25;
    }

    .gogo-lamp.mid {
        opacity: 0.6;
        box-shadow: 0 0 20px #ff4dff;
    }

    .gogo-lamp.high {
        opacity: 1;
        box-shadow: 0 0 30px #ff4dff;
        transform: scale(1.05);
    }

    /* シリーズ選択 */
    .select-box {
        background: #140020;
        padding: 10px 15px;
        border-radius: 10px;
        margin-bottom: 10px;
        box-shadow: 0 0 10px #5a189a;
    }

    .select-box label {
        font-size: 14px;
        color: #ffb3ff;
    }

    select {
        width: 100%;
        margin-top: 5px;
        padding: 8px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }

    /* 入力ボックス */
    .input-box, .result-box {
        background: #1a0b2e;
        padding: 5px;
        border-radius: 12px;
        width: 100%;
        margin: 0 auto 5px auto;
        box-shadow: 0 0 15px #5a189a;
        text-align: center;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 6px 0;
        border-radius: 8px;
        border: none;
        font-size: 18px;
        text-align: center;
    }

    /* 補正パイロットランプ */
    .pilot-wrap {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin:0 0 5px 0;
        font-size: 13px;
    }

    .pilot {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .pilot-lamp {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: radial-gradient(circle at center, #3a0050 0%, #050010 70%);
        box-shadow: 0 0 5px #000;
        transition: 0.2s;
    }

    .pilot-lamp.on {
        background: radial-gradient(circle at center, #ff4dff 0%, #7b2cbf 40%, #050010 100%);
        box-shadow: 0 0 10px #ff4dff;
    }

    /* 判定ボタン */
    .btn-wrap {
        width: 100%;
        text-align: center;
        margin-top: 0px;

        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        gap: 15px;
    }

    /* ▼ ぶどうモードボタン */
    .grape-btn {
       margin-top: 0px;
    }

    button {
        background: radial-gradient(circle at top, #ff4dff 0%, #7b2cbf 40%, #3a0050 100%);
        color: white;
        padding: 14px 30px;
        border: none;
        border-radius: 10px;
        font-size: 20px;
        cursor: pointer;
        width: 90%;
        max-width: 300px;
        display: inline-block;
        box-shadow: 0 0 15px #ff4dff;
        transition: 0.15s;
    }

    button:hover {
        box-shadow: 0 0 25px #ffb3ff;
        transform: scale(1.03);
    }

    .setting-line {
        font-size: 18px;
        margin: 4px 0;
    }

    canvas {
        display: block;
        margin: 10px auto 0;
        width: 100%;
        max-width: 350px;
    }

/* ▼▼▼ テンキー（下からスライドイン） ▼▼▼ */
.keypad {
    position: fixed;
    bottom: -260px;
    left: 0;
    width: 100%;
    background: #2a003d;
    padding: 10px 0;
    box-shadow: 0 -5px 20px #ff4dff;
    border-radius: 20px 20px 0 0;
    transition: 0.25s ease-out;
    z-index: 9999;
}

.keypad.show {
    bottom: 0;
}

.keypad-grid {
    width: 85%;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.key {
    background: radial-gradient(circle at top, #ff4dff 0%, #7b2cbf 40%, #3a0050 100%);
    padding: 14px 0;
    border-radius: 10px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    box-shadow: 0 0 10px #ff4dff;
    user-select: none;
    transition: 0.1s;
}
    
    .key:active {
        box-shadow: 0 0 25px #ffb3ff;
        transform: scale(1.05);
    }
    /* ▼ 状態表示ライン */
.status-line {
    font-size: 20px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

/* ▼ 矢印の基本形（形だけ） */
.status-line .arrow {
    display: inline-block;
    font-size: 22px;
    font-weight: bold;
}

/* ▼ DOWN：赤い右下矢印が流れる */
.status-line.DOWN .arrow::after {
    content: "↘";
    color: #ff3b3b;
    text-shadow: 0 0 10px #ff3b3b, 0 0 20px #ff0000;
    animation: downFlow 0.8s infinite alternate ease-in-out;
}

@keyframes downFlow {
    from { transform: translate(0, 0); opacity: 0.5; }
    to   { transform: translate(6px, 6px); opacity: 1; }
}

/* ▼ KEEP：青い矢印が左→右へ流れる */
.status-line.KEEP .arrow::after {
    content: "→";
    color: #4db8ff;
    text-shadow: 0 0 10px #4db8ff, 0 0 20px #0099ff;
    animation: keepFlow 0.8s infinite alternate ease-in-out;
}

@keyframes keepFlow {
    from { transform: translateX(0); opacity: 0.5; }
    to   { transform: translateX(8px); opacity: 1; }
}

    /* ▼ オーバーレイ（画面全体に重ねる） */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* 中身のボックス（縦長＋余白増やす） */
.overlay-content {
    position: relative;
    background: #1a1a1a;
    padding: 28px 24px;   /* ← ここを増やして縦に余裕を作る */
    border-radius: 14px;
    width: 280px;         /* ← 少し横も広げてバランスUP */
    color: #fff;
    box-shadow: 0 0 12px rgba(255,0,255,0.4);
}

/* 右上の ❌ ボタン（絵文字風） */
.overlay-close {
    position: absolute;
    top: 10px;            /* ← 余裕を持たせてかぶり防止 */
    right: 10px;
    background: transparent;
    border: none;
    font-size: 28px;      /* ← 絵文字を大きくして押しやすく */
    cursor: pointer;
    line-height: 1;
}

/* 行のスタイル */
.grape-row {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    font-size: 17px;
}

/* ＋ − ボタン */
.grape-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.grape-buttons button {
    width: 48%;
    padding: 12px 0;
    font-size: 20px;
    background: #6a00ff;
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
}


   /* ▼ ダブルタップ拡大を無効化（ここに追加） */
#grapeOverlay {
    touch-action: none;
}
    
/* ▼ 非表示状態（最初は隠す） */
.hidden {
    display: none;
}
  
</style>
</head>
<body>
<div class="wrapper">

    <h1>ジャグラー設定判定AI</h1>

    <!-- GOGOランプ -->
    <div class="gogo-wrap">
        <div id="gogoLamp" class="gogo-lamp">GOGO!</div>
    </div>

    <!-- シリーズ選択 -->
    <div class="select-box">
        <label for="seriesSelect">シリーズ選択（6号機）</label>
        <select id="seriesSelect">
            <option value="myjv">マイジャグラーV</option>
            <option value="aim6">アイムジャグラーEX（6号機）</option>
            <option value="funky2">ファンキージャグラー2</option>
            <option value="gogo3">ゴーゴージャグラー3</option>
        </select>
    </div>

    <!-- 入力欄 -->

<input id="spins" type="text" inputmode="none" placeholder="総回転数" onclick="openKeypad(this)">
<input id="big" type="text" inputmode="none" placeholder="BIG" onclick="openKeypad(this)">
<input id="reg" type="text" inputmode="none" placeholder="REG" onclick="openKeypad(this)">
<input id="maxcoin" type="text" inputmode="none" placeholder="最高出玉" onclick="openKeypad(this)">
<input id="currentCoin" type="text" inputmode="none" placeholder="現在持ち玉" onclick="openKeypad(this)">

        <!-- 補正ランプ -->
        <div class="pilot-wrap">
            <div class="pilot">
                <div id="pilotGrape" class="pilot-lamp"></div>
                <span>ぶどう補正</span>
            </div>
            <div class="pilot">
                <div id="pilotDiff" class="pilot-lamp"></div>
                <span>差枚補正</span>
            </div>
        </div>

    <!-- 判定ボタン -->
    <div class="btn-wrap">
        <button onclick="judge()">GOGO! 判定する</button>
  
    <!-- ぶどうモードボタン -->    
        <button onclick="openOverlay()">ぶどうモードテスト表示</button>
    </div>
 </div>

    <!-- 結果 -->
    <div id="result" class="result-box" style="display:none;"></div>

    <!-- グラフ -->
    <canvas id="chart"></canvas>

</div>
  
<!-- ▼▼▼ テンキー ▼▼▼ -->
<div id="keypad" class="keypad">
    <div class="keypad-grid">
        <div class="key" onclick="pressKey('7')">7</div>
        <div class="key" onclick="pressKey('8')">8</div>
        <div class="key" onclick="pressKey('9')">9</div>

        <div class="key" onclick="pressKey('4')">4</div>
        <div class="key" onclick="pressKey('5')">5</div>
        <div class="key" onclick="pressKey('6')">6</div>

        <div class="key" onclick="pressKey('1')">1</div>
        <div class="key" onclick="pressKey('2')">2</div>
        <div class="key" onclick="pressKey('3')">3</div>

        <div class="key" onclick="toggleMinus()">±</div>
        <div class="key" onclick="pressKey('0')">0</div>
        <div class="key" onclick="backspace()">←</div>
    </div>
</div>

<!-- 🍇 オーバーレイ（ここに置く） -->
<div id="overlay" class="overlay">
    <div class="overlay-content">
        <button class="overlay-close" onclick="closeOverlay()">❌</button>

        <div class="grape-row">
            <span>予測ぶどう：</span>
            <span id="grapePredicted">—</span>
        </div>

        <div class="grape-row">
            <span>実測ぶどう：</span>
            <span id="grapeActual">—</span>
        </div>

        <div class="grape-row">
            <span>ズレ：</span>
            <span id="grapeDiff">—</span>
        </div>

        <div class="grape-buttons">
            <button onclick="addGrape()">＋</button>
            <button onclick="removeGrape()">−</button>
        </div>
    </div>
</div>

<script>

let activeInput = null;

/* ▼ テンキー開閉 ▼ */
function openKeypad(input) {
    activeInput = input;
    document.getElementById("keypad").classList.add("show");
}

document.addEventListener("click", function(e) {
    const keypad = document.getElementById("keypad");

    // テンキーを押した → 閉じない
    if (e.target.closest(".keypad")) return;

    // 入力欄を押した → 開く（閉じない）
    if (e.target.closest("input")) return;

    // それ以外 → 閉じる
    keypad.classList.remove("show");
});


/* ▼ テンキー入力 ▼ */
function pressKey(num) {
    if (!activeInput) return;
    activeInput.value += num;
}

function backspace() {
    if (!activeInput) return;
    activeInput.value = activeInput.value.slice(0, -1);
}

function toggleMinus() {
    if (!activeInput) return;
    if (activeInput.value.startsWith("-")) {
        activeInput.value = activeInput.value.slice(1);
    } else {
        activeInput.value = "-" + activeInput.value;
    }
}

/* ▼ シリーズデータ ▼ */
const seriesData = {
    myjv: {
        name: "マイジャグラーV",
        setting: {
            1: { big: 287, reg: 431, sum: 172, grape: 6.35, rate: 0.97 },
            2: { big: 282, reg: 364, sum: 160, grape: 6.33, rate: 0.984 },
            3: { big: 273, reg: 341, sum: 152, grape: 6.29, rate: 0.997 },
            4: { big: 264, reg: 292, sum: 138, grape: 6.25, rate: 1.027 },
            5: { big: 259, reg: 259, sum: 129, grape: 6.23, rate: 1.053 },
            6: { big: 240, reg: 240, sum: 120, grape: 6.18, rate: 1.094 }
        }
    },
    aim6: {
        name: "アイムジャグラーEX（6号機）",
        setting: {
            1: { big: 273, reg: 439, sum: 169, grape: 6.40, rate: 0.96 },
            2: { big: 270, reg: 399, sum: 161, grape: 6.38, rate: 0.97 },
            3: { big: 268, reg: 331, sum: 152, grape: 6.36, rate: 0.995 },
            4: { big: 260, reg: 299, sum: 141, grape: 6.34, rate: 1.02 },
            5: { big: 255, reg: 255, sum: 127, grape: 6.32, rate: 1.04 },
            6: { big: 237, reg: 237, sum: 118, grape: 6.30, rate: 1.06 }
        }
    },
    funky2: {
        name: "ファンキージャグラー2",
        setting: {
            1: { big: 273, reg: 439, sum: 169, grape: 6.40, rate: 0.97 },
            2: { big: 268, reg: 399, sum: 161, grape: 6.38, rate: 0.98 },
            3: { big: 260, reg: 331, sum: 152, grape: 6.36, rate: 1.00 },
            4: { big: 252, reg: 299, sum: 141, grape: 6.34, rate: 1.03 },
            5: { big: 246, reg: 255, sum: 127, grape: 6.32, rate: 1.05 },
            6: { big: 234, reg: 234, sum: 117, grape: 6.30, rate: 1.08 }
        }
    },
    gogo3: {
        name: "ゴーゴージャグラー3",
        setting: {
            1: { big: 276, reg: 431, sum: 171, grape: 6.40, rate: 0.97 },
            2: { big: 270, reg: 364, sum: 160, grape: 6.38, rate: 0.98 },
            3: { big: 264, reg: 341, sum: 152, grape: 6.36, rate: 1.00 },
            4: { big: 258, reg: 292, sum: 141, grape: 6.34, rate: 1.03 },
            5: { big: 252, reg: 259, sum: 129, grape: 6.32, rate: 1.05 },
            6: { big: 240, reg: 240, sum: 120, grape: 6.30, rate: 1.08 }
        }
    }
};

let chart = null;

/* ▼ GOGOランプ更新 ▼ */
function updateGogoLamp(grapeOn, diffOn, flash) {
    const lamp = document.getElementById("gogoLamp");
    lamp.classList.remove("mid", "high");

    if (flash) {
        lamp.classList.add("high");
        setTimeout(() => {
            lamp.classList.remove("high");
            if (grapeOn || diffOn) lamp.classList.add("mid");
        }, 250);
        return;
    }

    if (grapeOn || diffOn) lamp.classList.add("mid");
}

/* ▼ 補正ランプ更新 ▼ */
function updatePilotLamps(grapeOn, diffOn) {
    document.getElementById("pilotGrape").classList.toggle("on", grapeOn);
    document.getElementById("pilotDiff").classList.toggle("on", diffOn);
}

/* ▼ 判定 ▼ */
function judge() {
    const actualCoin = Number(document.getElementById("currentCoin").value) || 0;　　　// <-----入れた
    const seriesKey = document.getElementById("seriesSelect").value;
    const settingTable = seriesData[seriesKey].setting;

    const spins = Number(document.getElementById("spins").value) || 0;
    const big = Number(document.getElementById("big").value) || 0;
    const reg = Number(document.getElementById("reg").value) || 0;
    const maxcoin = Number(document.getElementById("maxcoin").value) || 0;
    const currentCoin = Number(document.getElementById("currentCoin").value) || 0;

    const sum = big + reg;
    const diffCoin = currentCoin - maxcoin;

    const status = diffCoin < 0 ? "DOWN" : "KEEP";
    const diffOn = (currentCoin !== 0 || maxcoin !== 0);
    const grapeOn = false; 
    
    updatePilotLamps(grapeOn, diffOn);
    updateGogoLamp(grapeOn, diffOn, true);

    let scores = {};

    for (let s = 1; s <= 6; s++) {
        const base = settingTable[s];

        const actualBig = big > 0 ? spins / big : 9999;
        const actualReg = reg > 0 ? spins / reg : 9999;
        const actualSum = sum > 0 ? spins / sum : 9999;

        const diffBig = Math.abs(actualBig - base.big);
        const diffReg = Math.abs(actualReg - base.reg);
        const diffSum = Math.abs(actualSum - base.sum);

        let score =
            (1 / (diffBig + 1)) * 1 +
            (1 / (diffReg + 1)) * 3 +
            (1 / (diffSum + 1)) * 4;

        if (diffOn) {
            const expectedCoin = spins * 3 * base.rate;
            const diffCoinCalc = Math.abs(actualCoin - expectedCoin);
            score += (1 / (diffCoinCalc + 1)) * 1;
        }

        scores[s] = score;
    }

    const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
    for (let s = 1; s <= 6; s++) {
        scores[s] = (scores[s] / total) * 100;
    }
    
    // ▼ 結果表示（ここはそのまま）
    let html = `<h2>${seriesData[seriesKey].name} 設定判別結果</h2>`;
    html += `
<div class="status-line ${status}">
  状態：<b>${status}</b>
  <span class="arrow"></span>
</div>`;

    html += `<div style="font-size:16px; margin-bottom:12px;">差枚：${diffCoin} 枚</div>`;

for (let s = 1; s <= 6; s++) {
    html += `<div class="setting-line">設定${s}：${scores[s].toFixed(1)}%</div>`;
}

const resultBox = document.getElementById("result");
resultBox.innerHTML = html;
resultBox.style.display = "block";

const ctx = document.getElementById("chart");
if (chart) chart.destroy();

chart = new Chart(ctx, {
    type: "bar",
    data: {
        labels: ["設定1", "設定2", "設定3", "設定4", "設定5", "設定6"],
        datasets: [{
            data: [
                scores[1], scores[2], scores[3],
                scores[4], scores[5], scores[6]
            ],
            backgroundColor: [
                "#ff4d6d", "#ffb3c1", "#c77dff",
                "#9d4edd", "#7b2cbf", "#5a189a"
            ],
            borderColor: "#ffffff",
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true, ticks: { color: "white" } },
            x: { ticks: { color: "white" } }
        },
        plugins: { legend: { display: false } }

    }
});   

    // ▼ 予測ぶどうの計算
   const predictedObj = calcPredictedGrape(scores, seriesKey);

　　window.predictedSetting = predictedObj.setting;
　　window.predictedGrape = predictedObj.grape;

　　updatePredictedGrape(predictedObj);
　　updateGrapeDisplay(predictedObj.grape);
 

}   // ← ★★★ ここで judge() を閉じる！！ ★★★

    
/* ▼ 実測ぶどうの表示更新 ▼ */
function updateGrapeDisplay(predicted) {
    if (grapeCount === 0) {
        document.getElementById("grapeActual").innerText = "—";
        document.getElementById("grapeDiff").innerText = "—";
        return;
    }

    const actual =　100 / grapeCount;                                            //変更箇所
    document.getElementById("grapeActual").innerText = `1/${actual.toFixed(2)}`;

    if (predicted !== null && predicted !== undefined) {
        document.getElementById("grapePredicted").innerText = `1/${predicted.toFixed(2)}`;
        
        const diff = calcGrapeDiff(actual, predicted);
        displayGrapeDiff(diff);
    }
}

/* ▼ オーバーレイ開閉 ▼ */
function openOverlay() {
    document.getElementById("overlay").style.display = "flex";
}

function closeOverlay() {
    document.getElementById("overlay").style.display = "none";
}

let grapeCount = 0;
    
function addGrape() {
    grapeCount++;
    updateGrapeDisplay(window.predictedGrape);
}

function removeGrape() {
    if (grapeCount > 0) grapeCount--;
    updateGrapeDisplay(window.predictedGrape);
}

function updateGrapeDisplay(predicted) {
    const actualCount = grapeCount;

    if (actualCount === 0) {
        document.getElementById("grapeActual").innerText = "—";
        document.getElementById("grapeDiff").innerText = "—";
        document.getElementById("grapePredicted").innerText = "—";
        return;
    }

    const actualRate = 100 / actualCount;

    // 実測ぶどう：カウント＋確率
    document.getElementById("grapeActual").innerText =
        `${actualCount} 回（1/${actualRate.toFixed(2)}）`;

    // 予測ぶどう（公称値）
    if (predicted !== null && predicted !== undefined) {
        document.getElementById("grapePredicted").innerText =
            `設定${window.predictedSetting}（1/${predicted.toFixed(2)}）`;

        const diff = calcGrapeDiff(actualRate, predicted);
        displayGrapeDiff(diff);
    }
}

//予測ぶどうの表示（設定〇　（1/〇〇））
function updatePredictedGrape(predictedObj) {
    const el = document.getElementById("grapePredicted");
    if (!el) return;

    el.innerText = `設定${predictedObj.setting}（1/${predictedObj.grape.toFixed(2)}）`;
}
   
function calcGrapeDiff(actual, predicted) {
    return actual - predicted;
}

function displayGrapeDiff(diff) {
    const el = document.getElementById("grapeDiff");

    if (diff > 0) {
        el.innerText = `重い（+${diff.toFixed(2)}）`;
    } else if (diff < 0) {
        el.innerText = `軽い（${diff.toFixed(2)}）`;
    } else {
        el.innerText = "一致";
    }
}

function calcPredictedGrape(settingProb, seriesKey) {
    // 最も確率が高い設定を採用
    let bestSetting = 1;
    let bestProb = 0;

    for (let s = 1; s <= 6; s++) {
        if (settingProb[s] > bestProb) {
            bestProb = settingProb[s];
            bestSetting = s;
        }
    }

    // シリーズごとの公称ぶどう値
    const grapeRate = seriesData[seriesKey].setting[bestSetting].grape;

    return {
        setting: bestSetting,
        grape: grapeRate
    };
}

function calcGrapeDiff(actual, predicted) {
